services:
  bot:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./downloads:/app/downloads
      - bot_api_data:/var/lib/telegram-bot-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot_api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    env_file: .env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-placeholder}
      TELEGRAM_LOCAL: 1
      TELEGRAM_STAT: 1
    volumes:
      - bot_api_data:/var/lib/telegram-bot-api
    profiles: ["bigfiles"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8081"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  bot_api_data:
